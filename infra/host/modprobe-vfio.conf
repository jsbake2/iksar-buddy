# /etc/modprobe.d/vfio.conf on the CachyOS host (10.0.0.16).
# Reserve the RTX 4070 (GPU 10de:2786 + its HD-audio 10de:22bc) for VM
# passthrough at boot, BEFORE nvidia/nouveau/i915 can claim it. The host display
# runs on the Intel iGPU (i915); the 4070 is dedicated to the iksar_buddy VM.
#
# Pair with: MODULES=(vfio_pci vfio vfio_iommu_type1) in /etc/mkinitcpio.conf and
# `intel_iommu=on iommu=pt` on the kernel cmdline (GRUB). Regenerate with
# `mkinitcpio -P` after editing. See PASSTHROUGH.md.
options vfio-pci ids=10de:2786,10de:22bc
softdep nvidia pre: vfio-pci
softdep nouveau pre: vfio-pci
softdep drm pre: vfio-pci

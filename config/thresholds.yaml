# Decision thresholds + priority lists (owner-tunable, hot-reloaded).

# HP fractions (0.0-1.0) read from pixel scanlines. Tiered heals by deficit:
hp_standard:  0.90          # below this = hurt -> standard heal (mana-gated)
hp_critical:  0.75          # below this = critical -> bigger heal, ignores mana
hp_emergency: 0.50          # below this = dire -> emergency heal, cancels cast
mana_floor:   0.30          # own power below this = "low mana" -> skip standard heals
group_heal_count:     2     # >= this many members hurt -> group heal
group_critical_count: 3     # >= this many members critical -> group (critical) heal
tank_emergency_hp: 0.35     # legacy / dashboard banding
routine_hp:        0.90     # cosmetic / dashboard banding

# Ward maintenance (the heartbeat).
ward_refresh_lead_ms: 1500  # refresh ward this long before expected expiry
ward_absent_recast:   true  # recast immediately if ward icon absent

# Group ward.
group_ward_on_ae: true      # cast group ward when AE-incoming signal present

# Rez loop.
rez_wait_for_inzone_s: 30   # bot dead: wait this long for an in-zone rez before self-revive at stone
rez_priority:               # bot alive, others dead: rez order by role. Tank ALWAYS first.
  - tank
  - healer
  - support
  - dps

# Cure handling: order to resolve when multiple detriments are pending.
cure_priority:
  - noxious
  - elemental
  - trauma
  - arcane
  - curse

# Command pacing (brain/server.py; hot-reloaded). GCD caps how often ANY command
# goes out; per-action cooldowns block repeating the SAME (action,target) until it
# had time to land + show on screen. Values are land+sensor-lag estimates per spell.
gcd_s: 0.6
cooldown_default_s: 1.5     # any action not in the table below
cooldowns_s:
  cure: 1.6                 # a multi-detriment member gets cleaned ~1.6s/cure
  group_cure: 1.6
  ward: 5.0
  group_ward: 5.0
  group_heal: 1.2
  direct_heal: 1.0          # heal cadence: emergency ~0.7s, critical ~0.8s, std ~1.0s
  critical_heal: 0.8
  emergency_heal: 0.6
  emergency_ward: 1.0
prepull_debounce_s: 3.0     # min gap between pre_pull fires on repeated incoming-calls

# Event/combat detection (host_agent at startup + pushed to the in-guest agent).
rez_window_s: 240           # post-revive window: lit detriments = rez sickness, no cure
combat_hp_drop: 0.02        # HP fraction lost between cycles that reads as "took a hit"
combat_decay_s: 5.0         # in-combat decays to OOC this long after the last hit
chat_hysteresis_s: 3.0      # any chat-input activity latches "busy" this long (cursor blink)
combat_log_poll_s: 1.0      # host fallback combat-log poll period

# Loop cadence.
decision_hz: 12             # sense->decide->act loop rate (pixels carry it; 10-15 plenty)
ward_heartbeat_s: 8.4
assist_heartbeat_s: 4   # re-send pet + assist (attack key) every N s while in combat

# Combat debuff cycle (any group): debuff every N s, but only when power >= floor.
debuff_cycle_s: 10
debuff_power_floor: 0.50

# Periodic recast buffs / HoTs + Dirge mana feed (fire only when the active profile
# maps the keys). pbuff_* drive the Recast-buffs panel: the Dirge's support buffs AND
# a healer's HoTs (e.g. a Fury's Fury Flatulence). Global, like ward_heartbeat_s —
# tuned against whichever profile is active. mana feed is Dirge-only.
mana_heal_floor:   0.0      # power fraction below which a pos-2/3/4 member gets a mana feed; 0 = off
mana_heal_recast_s: 6       # min seconds between mana feeds on the same target
pbuff_1_interval_s: 0       # recast periodic buff / HoT 1 every N s in combat; 0 = off
pbuff_2_interval_s: 0
pbuff_3_interval_s: 0
pbuff_4_interval_s: 0
pbuff_1_target: 0           # optional cast target, group slot 1-6; 0/1 = self
pbuff_2_target: 0
pbuff_3_target: 0
pbuff_4_target: 0

# Decision thresholds + priority lists (owner-tunable, hot-reloaded).

# HP fractions (0.0-1.0) read from pixel scanlines. Tiered heals by deficit:
hp_standard:  0.90          # below this = hurt -> standard heal (mana-gated)
hp_critical:  0.75          # below this = critical -> bigger heal, ignores mana
hp_emergency: 0.50          # below this = dire -> emergency heal, cancels cast
mana_floor:   0.30          # own power below this = "low mana" -> skip standard heals
group_heal_count:     2     # >= this many members hurt -> group heal
group_critical_count: 3     # >= this many members critical -> group (critical) heal
tank_emergency_hp: 0.35     # legacy / dashboard banding
routine_hp:        0.90     # cosmetic / dashboard banding

# Ward maintenance (the heartbeat).
ward_refresh_lead_ms: 1500  # refresh ward this long before expected expiry
ward_absent_recast:   true  # recast immediately if ward icon absent

# Group ward.
group_ward_on_ae: true      # cast group ward when AE-incoming signal present

# Rez loop.
rez_wait_for_inzone_s: 30   # bot dead: wait this long for an in-zone rez before self-revive at stone
rez_priority:               # bot alive, others dead: rez order by role. Tank ALWAYS first.
  - tank
  - healer
  - support
  - dps

# Cure handling: order to resolve when multiple detriments are pending.
cure_priority:
  - noxious
  - elemental
  - trauma
  - arcane
  - curse

# Loop cadence.
decision_hz: 12             # sense->decide->act loop rate (pixels carry it; 10-15 plenty)
ward_heartbeat_s: 8.4
assist_heartbeat_s: 4   # re-send pet + assist (attack key) every N s while in combat

# 2-man DPS contribution (tank+healer only): debuff, then spell_attack lead s later, every cycle s.
dps_cycle_s: 8
dps_spell_lead_s: 2

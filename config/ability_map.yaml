# Ability -> keybind map (OWNER-OWNED, SME fills this).
#
# The code references abilities by ROLE, never by hardcoded spell name. You map
# each role to the hotbar key the Defiler presses. Keyspace hygiene
# (PROJECT.md §6.2): avoid any key EQ2 treats as a chat/reply trigger
# (Enter, /, ', etc.). All keys below are safe (digits / modified keys).
#
# Key format: a bare key ("4", "f2") or "Mod+Key" ("Ctrl+1", "Alt+="). The
# injector parses modifiers (Ctrl/Alt/Shift) and holds them for the tap.
# `mode`: auto = the decision loop may fire it; manual = only a dashboard button.
#
# Character: Jenskin (Defiler) on Woushi.

healer: defiler

abilities:
  # --- combat ---
  attack:          { key: "1",      mode: auto,   desc: "send pet + assist; fired once on combat start" }
  spell_attack:    { key: "2",      mode: manual, desc: "offensive nuke (power-hungry; manual only)" }
  debuff:          { key: "3",      mode: manual, desc: "debuff/slow incoming target (auto later w/ power)" }

  # --- heals / wards (single-target; targeted via group_target_keys) ---
  # The prior tool healed in TIERS by HP deficit: standard heal when hurt,
  # CRITICAL (bigger) heal when low, EMERGENCY when dire. Mana-aware: critical/
  # emergency fire regardless of power; standard heals skip when low on power.
  direct_heal:     { key: "4",      mode: auto,   cast_ms: 1500, desc: "standard single-target heal" }
  critical_heal:   { key: "",       mode: auto,   cast_ms: 1500, desc: "bigger heal for CRITICAL hp (skill not learned yet)" }
  emergency_heal:  { key: "",       mode: auto,   cast_ms: 800,  desc: "emergency heal, cancels current cast (skill not learned yet)" }
  ward:            { key: "5",      mode: auto,   cast_ms: 1000, desc: "tank ward (heartbeat) -- spell not learned yet, wired ahead" }
  emergency_ward:  { key: "",       mode: auto,   cast_ms: 800,  desc: "emergency ward (skill not learned yet)" }

  # --- cure (GENERIC: one cure clears any detriment type; see detriment work) ---
  cure:            { key: "0",      mode: auto,   cast_ms: 500,  desc: "GENERIC cure (any detriment type)" }

  # --- revive (per-member: target via F-key, then cast) ---
  rez:             { key: "Ctrl+1", mode: manual, cast_ms: 6000, desc: "revive a dead member (target via group_target_keys first)" }

  # --- utility / movement (from the prior tool; fill the keys your toon has) ---
  follow:          { key: "Alt+=",  mode: manual, desc: "auto-follow toggle" }
  stop_follow:     { key: "",       mode: manual, desc: "stop following (prior tool used bare '=')" }
  call_home:       { key: "Alt+-",  mode: manual, desc: "Call of the Overlord / call to home" }
  hail:            { key: "",       mode: manual, desc: "hail NPC (quest turn-ins / interaction)" }
  jump:            { key: "",       mode: manual, desc: "jump (un-stick / pathing)" }
  collect:         { key: "",       mode: manual, desc: "collect a collection shiny" }
  gather:          { key: "",       mode: manual, desc: "gather / harvest a resource node (big button)" }
  sow:             { key: "",       mode: manual, desc: "speed buff (SoW / totem) on the group" }
  evac:            { key: "",       mode: manual, desc: "emergency evac / GTFO" }
  pre_pull:        { key: "",       mode: manual, desc: "pre-pull routine (debuff incoming + ward up)" }
  item_use:        { key: "",       mode: manual, desc: "use item (totem / temp buff)" }

  # --- buffs (manual for now; auto on prepull later) ---
  buff1:           { key: "Alt+5",  mode: manual, desc: "buff key 1" }
  buff2:           { key: "Alt+6",  mode: manual, desc: "buff key 2" }
  buff_tank:       { key: "Alt+7",  mode: manual, desc: "buff: tank" }
  buff_dps:        { key: "Alt+8",  mode: manual, desc: "buff: DPS" }
  buff_self:       { key: "Alt+9",  mode: manual, desc: "buff: self" }

  # --- group versions ('none' -> single-target each member with the base key) ---
  group_heal:      { key: "8",      mode: auto,   cast_ms: 1500, desc: "group heal" }
  group_ward:      { key: "9",      mode: auto,   cast_ms: 1500, desc: "group ward (AE incoming)" }
  group_cure:      { key: "none",   mode: auto,   cast_ms: 800,  desc: "no dedicated group cure -> single-target cure (0) per member" }

# In-game social macros (fired as hotkeys, NEVER typed as /-commands). Map to keys
# bound to /-macros inside EQ2.
macros:
  accept_rez:      { key: "", desc: "accept an incoming rez prompt on Jenskin -- TO BUILD host-side (OCR the rez dialog + click Accept, like invite_accept.py)" }

# Group slot -> targeting key. To act on a specific member (heal/ward/cure/revive),
# the agent taps this key to TARGET them, then the ability key. EQ2 default
# (F1=self, F2..F6=members) confirmed by owner.
group_target_keys: ["F1", "F2", "F3", "F4", "F5", "F6"]   # slot0=self(Jenskin)..slot5

# Role per group slot, set from the dashboard (the tank isn't always slot 1).
# tank_slot is DERIVED from wherever "tank" sits, so the loop targets the tank's
# F-key correctly regardless of group order. Roles: healer/tank/dps/support.
slot_roles: ["healer", "tank", "dps", "dps", "support", "support"]
tank_slot: 1   # derived from slot_roles (index of "tank"); kept for convenience

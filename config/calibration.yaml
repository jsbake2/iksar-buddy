# Screen geometry / sensor regions (OWNER-OWNED, versioned with the VM snapshot).
#
# EVERYTHING here derives from the locked client resolution + UI scale. Fix
# those first (PROJECT.md §12), then fill these by reading pixel coords off a
# calibration screenshot. Until then these are placeholders.
#
# Coordinates are absolute client-window pixels at the locked resolution.

resolution: { w: 1920, h: 1080 }  # LOCKED (virtio-gpu EDID). All coords below
                                 # are absolute pixels at 1920x1080.
ui_scale: 1.0                    # FILL: locked in-game UI scale

# Per-member HP/power bars in the stacked GROUP window (left column).
# SELF-LOCATING: agent finds each bar row by color within its slot band; the
# numbers below are the derived geometry, not load-bearing magic. Measured live
# from a 2-member group (Jenskin slot0 + Foxyman slot1); pitch confirmed 75px.
#   HP row    y = base_y + pitch*slot   (green)
#   power row y = base_y + 8  + pitch*slot (blue, 8px under HP)
#   track     x = x0..x1 (fixed); fill% = bright px in track / (x1-x0)
group_bars:
  x0: 33
  x1: 139
  hp_base_y: 120      # slot-0 HP row
  pwr_base_y: 128     # slot-0 power row
  pitch: 75           # vertical px between consecutive member frames
  slots: 6            # extrapolate base_y + pitch*slot for slots 0..5
  hp_fill: green
  pwr_fill: blue

# Self HP + power bars (own frame, top-left). fill% = (bright pixels in the
# track) / (x1-x0); the depleted portion goes dark and drops out of the count.
# The agent auto-finds the bar row by color (green HP / blue power) within the
# frame region, so y is a hint, not load-bearing. Validated full=100% solo;
# confirm partial-fill behavior in combat.
self_hp_bar: { x0: 19, x1: 128, y: 38, fill: green }
power_bar:   { x0: 19, x1: 128, y: 46, fill: blue }

# Cast bar: presence => mid-cast, don't double-cast.
cast_bar:    { x0: 0, x1: 0, y: 0, active_rgb: [0, 0, 0] }

# Ward / buff icon presence (heartbeat: ward up?).
ward_icon:   { x: 0, y: 0, present_rgb: [0, 0, 0], tol: 12 }

# Chat-Safety Guard: the chat INPUT bar region. If the "input active"
# fingerprint is present, focus is NOT on the game world -> fail closed.
chat_input:  { x0: 0, x1: 0, y0: 0, y1: 0, active_rgb: [0, 0, 0], tol: 10 }

# Filtered chat window (OCR target: large font, black bg, high-contrast text).
chat_ocr:    { x0: 0, x1: 0, y0: 0, y1: 0 }

# Launcher fingerprints: a small region + expected color that uniquely
# identifies each screen (login / char-select / in-world / invite dialog).
fingerprints:
  login_screen:    { x: 0, y: 0, rgb: [0, 0, 0], tol: 12 }
  char_select:     { x: 0, y: 0, rgb: [0, 0, 0], tol: 12 }
  in_world:        { x: 0, y: 0, rgb: [0, 0, 0], tol: 12 }
  invite_dialog:   { x: 0, y: 0, rgb: [0, 0, 0], tol: 12 }
  rez_prompt:      { x: 0, y: 0, rgb: [0, 0, 0], tol: 12 }

# Char-select slot for Jenskin (fixed coords once known).
char_slot: { x: 0, y: 0 }

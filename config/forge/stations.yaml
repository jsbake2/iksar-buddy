# Forge crafting bots (FORGE.md §7). Two bot slots; each binds to a guest VM and
# an EQ2 character. enabled=false hides/parks a slot. Owner-owned, hot-reloadable.
#
# Both VMs are identical clones, so one calibration profile (craft.yaml) serves
# both. character = which crafter to select at char-select (OCR-and-click; each
# account will hold 2 crafters, see FORGE.md §5.5).

bots:
  - id: A
    label: "Bot A"
    dom: iksar_buddy
    character: Jenskin
    spice_port: 5900
    width: 1920
    height: 1080
    enabled: true
  - id: B
    label: "Bot B"
    dom: iksar_buddy2
    character: Robskin
    spice_port: 5910
    width: 1920
    height: 1080
    enabled: true

# EQ2 tradeskill classes (owner picks per craft run).
trade_classes:
  - alchemist
  - armorer
  - carpenter
  - jeweler
  - provisioner
  - sage
  - tailor
  - weaponsmith
  - woodworker

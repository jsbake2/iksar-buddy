# Forge craft calibration + kit profile (FORGE.md §4, §7). ONE profile serves both
# crafter VMs (identical clones). The LOGIC that reads these is built; the NUMBERS
# below are placeholders — fill them during in-game capture (FORGE.md "in-game
# capturing later"). Everything is for a fixed 1920x1080 guest. Anything marked
# CALIBRATE is a guess and will be measured live.
#
# Coordinate convention: [x, y] guest pixels. color: [r, g, b]. region: {x,y,w,h}.

# NOTE: the art KEYS (counter#1/#2/#3 x durability/progress) live in the owner
# keymap (config/forge/keymap.yaml), edited from the dashboard keymap window.
# This file holds CALIBRATION only (pixels/regions/templates/clicks).

# --- durability/progress mode pixel ------------------------------------------
# One pixel that reads the "progress/high" color when in progress mode; otherwise
# we run durability arts. CALIBRATE loc+color.
durability_mode:
  location: [1590, 324]            # CALIBRATE
  progress_color: [21, 190, 33]    # CALIBRATE (green = progress mode)
  tolerance: 12

# --- power (mana) gate -------------------------------------------------------
# Pixel that's the "ok" color when power is sufficient; below it we pause, fire
# the power ability, and wait. CALIBRATE.
power:
  location: [123, 71]              # CALIBRATE
  ok_color: [114, 114, 241]        # CALIBRATE (blue = power ok)
  tolerance: 14
  ability_key: ""                  # OWNER: key/macro that restores power (blank = just wait)

# --- begin / retry buttons (craft-loop heartbeat) ----------------------------
# Begin starts the next craft; Retry repeats the current recipe. Detect by a pixel
# fingerprint (fast); click region center to press. CALIBRATE.
begin:
  pixel: {location: [985, 827], color: [112, 165, 59], tolerance: 14}   # CALIBRATE
  click: [985, 827]                                                     # CALIBRATE
retry:
  pixel: {location: [1473, 828], color: [112, 165, 59], tolerance: 12}  # CALIBRATE
  click: [1473, 828]                                                    # CALIBRATE

# --- reaction matching (NO saved library — references captured live) ---------
# button_regions = the FIXED positions of the 3 reaction buttons in the craft
# window. At EACH craft start the worker grabs them fresh into memory and uses them
# as the match references, so any class/recipe (even a random quest craft for an
# undefined class) works without a per-class template library.
# region = where the ACTIVE reaction shows up (matched against the 3 references ->
# counter #; the worker presses keymap.arts[mode][counter-1]).
reaction:
  button_regions:                             # CALIBRATE: 3 boxes (counter #1/#2/#3)
    - {x: 1180, y: 980, w: 44, h: 44}
    - {x: 1230, y: 980, w: 44, h: 44}
    - {x: 1280, y: 980, w: 44, h: 44}
  region: {x: 1246, y: 427, w: 66, h: 60}     # CALIBRATE: where the active reaction shows
  confidence: 0.80
  poll_hz: 6                                  # how often to sample (FORGE.md §4.1)

# --- recipe selection (writ/single: search the recipe book) ------------------
# Clicks to clear the search, focus it, then select the first result, then refocus
# the craft window. type_text handles the recipe name (parens via shift+9/0).
recipe_select:
  clear_click:  [1191, 269]        # CALIBRATE (the small X)
  search_click: [954, 267]         # CALIBRATE (search box)
  result_click: [880, 348]         # CALIBRATE (first result)
  focus_click:  [1317, 512]        # CALIBRATE (a craft-window reaction button = keeps focus)

# Click here before pressing arts so keys land in the CRAFT WINDOW, not the
# hotbar/chat (FORGE.md §5 focus discipline). Usually == recipe_select.focus_click.
craft_focus_click: [1317, 512]     # CALIBRATE

# --- char-select: OCR-and-click the right character (FORGE.md §5.5) -----------
# Names repeat across servers (e.g. two Robskins) — pick the one on `server`
# (sorts toward the BOTTOM of the list). list_region is the left character list;
# play_click is the maroon Play button in the right detail panel. Measured at
# 1920x1080 from a live char-select; refine if the list scrolls.
char_select:
  list_region: {x: 80, y: 380, w: 420, h: 560}   # the "Select Character" name column (OCR)
  row_click_x: 100                                 # click the row-LEFT (portrait) to select;
                                                   # the name-text column is NOT the hotspot
  play_click: [1715, 890]                          # detail-panel Play (maroon)
  server: "Wuoshi"                                 # disambiguate duplicate names

# --- chat-safety (the inviolable invariant, PROJECT.md §6.2) ------------------
# Sample this region; if it holds typed text / a cursor, chat input is open and we
# must NOT inject. CALIBRATE for the crafter UI's chat bar.
chat_input:
  region: {x: 50, y: 1019, w: 208, h: 22}   # CALIBRATE
  bright_threshold: 25

# --- EQ2 chat log (scribed-recipe gathering) ---------------------------------
# "Read recipes from log" parses scribed-recipe lines (Recipe: "X" put in recipe
# book) out of the client chat log. EQ2 writes one log per character at
#   <dir>\<server>\eq2log_<character>.txt        (requires /log ON in-game)
# server comes from char_select.server; character from the bot's selected crafter.
# Windows paths are case-insensitive so the toon's capitalization doesn't matter.
eq2_log:
  dir: 'C:\Users\Public\Daybreak Game Company\Installed Games\EverQuest II\logs'  # CALIBRATE to the client install
  tail: 5000                                  # only scan the last N lines (logs grow huge)

# --- journal OCR region (writs) ----------------------------------------------
journal_ocr:
  region: {x: 1500, y: 360, w: 360, h: 220}  # CALIBRATE: quest-journal writ text
  scale_percent: 150
  tesseract_psm: 4

# --- timings (seconds) -------------------------------------------------------
timings:
  art_interval: 0.3        # gap between the 1-2-3 / 4-5-6 filler presses
  pause: 0.8               # pause after a filler sequence (interruptible by a counter)
  pause_low_mana: 2.5      # longer pause when mana is low (still interruptible)
  post_select: 0.5         # wait after selecting a recipe
  post_begin: 0.5          # wait after clicking Begin/Retry

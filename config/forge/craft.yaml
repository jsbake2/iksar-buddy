# Forge craft calibration + kit profile (FORGE.md §4, §7). ONE profile serves both
# crafter VMs (identical clones). Values CALIBRATED 2026-06-14 from owner-marked
# screenshots of iksar_buddy2 (see claude_findings/FINDINGS.md). Everything is for a
# fixed 1920x1080 guest. Items still marked CALIBRATE/TUNE need a live verify.
#
# Coordinate convention: [x, y] guest pixels. color: [r, g, b]. region: {x,y,w,h}.

# NOTE: the art KEYS (counter#1/#2/#3 x durability/progress) live in the owner
# keymap (config/forge/keymap.yaml), edited from the dashboard keymap window.
# This file holds CALIBRATION only (pixels/regions/templates/clicks).

# --- durability/progress mode pixel ------------------------------------------
# Owner rule (2026-06-14): durability < 80% -> durability arts (1/2/3); durability
# >= 80% -> progress arts (4/5/6). Sample ONE pixel at the 80% mark of the top
# (durability) bar: green => bar filled there => >=80% => "progress" mode; maroon =>
# depleted below 80% => "durability" mode.
# Bar geometry: track x581..882 (w=301) at y=262; gold quality ticks at x641 & x821.
# 80% point = x822 sits on the tick, so we sample x=824 (~80.7%, just right of it).
durability_mode:
  # OWNER-MARKED pixel on the GREEN durability bar (~80% mark): GREEN [34,205,46] = good
  # durability => progress arts (4/5/6); not green (maroon/dark) = low => durability arts (1/2/3).
  location: [857, 261]
  progress_color: [34, 205, 46]
  tolerance: 45

# --- power (mana) gate -------------------------------------------------------
# Owner rule: pause when power < 50% (single craft); during a WRIT we barrel forward
# and ignore this. Same self power bar the healer reads (agent/host_sensor.py): track
# x19..128 at y~46, blue=(117,117,234) when filled. Sample the 50% mark (x=74): blue
# => >=50% (ok); dark => <50% (pause).
power:
  location: [74, 46]
  ok_color: [115, 115, 230]
  tolerance: 45
  ability_key: ""                  # OWNER: key/macro that restores power (blank = just wait) — also keymap.mana_recover

# --- begin / retry buttons (craft-loop heartbeat) ----------------------------
# CONFIRMED: Create=LEFT(492,707), Begin=RIGHT(784,707). First craft shows "Begin";
# subsequent crafts the SAME spot becomes "Retry/Redo" — so begin & retry share the
# click point. Detection fingerprint = the button's gold border/text; its presence
# also signals craft-complete (the art bar is gone, the button is back).
# TUNE: gold can appear elsewhere — verify the fingerprint live (it's the craft
# heartbeat). A false hit ends a craft early; a miss just hangs (both chat-safe).
begin:
  pixel: {location: [784, 707], color: [207, 173, 107], tolerance: 45}
  click: [784, 707]
retry:
  pixel: {location: [784, 707], color: [207, 173, 107], tolerance: 45}
  click: [784, 707]
# Create button — used to START the first craft if Begin isn't showing (owner: "Begin
# or Create, whichever is available").
create:
  click: [492, 707]
# Repeat button — the green ↻ at the lower-right. Used to REPEAT the same recipe for
# crafts 2..N (owner step 8a), so we skip the search/select between same-recipe crafts.
repeat:
  click: [902, 709]

# Craft-DONE detection (owner: a craft ended when ANY of these reappears — the bar shows
# reaction-art icons during an active craft, so none are present then). Fires on
# success OR failure.
done_detect:
  create: {location: [492, 707], color: [248, 213, 126], tolerance: 40}   # Create button gold
  repeat: {region: {x: 884, y: 694, w: 38, h: 32}, green: [114, 167, 60], tolerance: 55, min_pixels: 30}
  # Begin/Retry uses the `begin` fingerprint above (gold @784,707).

# Craft-RUNNING detection (owner): the RED STOP-SIGN in the art-bar's right slot means a
# craft is actually running. Same slot is green ↻ when done. We click Begin until this
# shows (start-confirm), and a craft can't false-complete until we've seen it running.
running_detect:
  region: {x: 852, y: 694, w: 70, h: 34}
  red: [147, 62, 37]
  tolerance: 45
  min_pixels: 300                 # running ~1150 red px; done/green ~90 -> 300 separates cleanly

# --- reaction matching (NO saved library — references captured live) ---------
# CONFIRMED mechanic: during a craft the bottom bar is [book][1][2][3][4][5][6][stop].
# 1/2/3 = durability arts, 4/5/6 = progress arts; 3 reaction TYPES, paired 1<->4,
# 2<->5, 3<->6. At each craft start we grab icons 1/2/3 FRESH (button_regions) as the
# match references. When a reaction fires its icon shows in `region` (the counter
# slot left of its name, e.g. "Orange Hot Metal"); we match it to a type N in 1..3,
# then press the durability key (N) if durability<80% or the progress key (N+3) if >=80.
reaction:
  # The button TEMPLATES (40x40) must be SMALLER than the watch region so matchTemplate
  # can slide them inside it (else reaction_event skips them as 'too big' -> never fires).
  button_regions:                             # arts 1/2/3 icons (centers 640/683/726, y710)
    - {x: 620, y: 690, w: 40, h: 40}          # art 1
    - {x: 663, y: 690, w: 40, h: 40}          # art 2
    - {x: 706, y: 690, w: 40, h: 40}          # art 3
  region: {x: 574, y: 617, w: 48, h: 48}      # watch slot center ~598,641; 40px templates fit +4px slide
                                              # (measured: bg max 0.147 here vs counter 0.58-0.70 -> clean)
  # MEASURED live (2026-06-14): real counters match at 0.58-0.70; background 0.14,
  # cross-button noise during a counter 0.31. 0.45 catches all 3, rejects the rest.
  # (Was 0.80 — higher than any real counter, so it detected NOTHING.)
  confidence: 0.45
  poll_hz: 6                                  # how often to sample (FORGE.md §4.1)
  debug: false                                # in-guest agent dumps templates + watch crops + scores (TUNING)
  # COUNTER MASH (owner: push the art until the icon tints green=success / red=fail):
  press_interval: 0.12                        # mash cadence while a counter is uncountered
  green_delta: 16                             # watch-region mean-G rise vs onset baseline => SUCCESS
  red_delta: 16                               # watch-region mean-R rise vs onset baseline => FAIL

# --- recipe selection (writ/single: search the recipe book) ------------------
# Clear the search (the small X), focus the field, type name+ENTER to filter, click
# the first result, then refocus the craft window. type_text handles parens.
recipe_select:
  use_clear:    true               # click the X to clear the box before each search (owner-required)
  clear_click:  [443, 181]         # the X clear button (owner-marked; between the glass icon and the ▼)
  search_click: [349, 180]         # search input field — CLICKED + settled BEFORE typing (else keys hit the game)
  focus_click:  [837, 144]         # mouse-safe craft-window spot (keeps focus off hotbar/chat)
  # Rows render at a VARIABLE Y (result count / 2-line name wrap), so we OCR the WHOLE
  # list, find the recipe by name wherever it is, and click its ICON column at that row's
  # actual Y (double-click loads it). icon_x = the icon column; list_region = the rows
  # area (name column; difficulty is filtered out). match_threshold = token-overlap frac.
  match_threshold: 0.6
  focus_attempts: 3                # retry focus+type if the list didn't filter
  start_attempts: 4                # re-click Begin/Create until the red stop-sign shows (running)
  match_polls: 4                   # poll the list ~4x (post_search apart) before re-typing
  icon_x: 244                      # icon column (the selectable hotspot, left of the name)
  list_region: {x: 225, y: 195, w: 320, h: 485}   # FALLBACK: whole-list region (used when result_rows unset)
  # Explicit per-row OCR boxes + click points (owner-calibrated 2026-06-17, color-matched
  # markup). Each slot: OCR the `ocr` box -> recipe name; on the best EXACT match (Imbued/
  # Blessed rejected) click `click`. Deterministic; preferred over list_region when present.
  result_rows:
    - {ocr: {x: 258, y: 268, w: 207, h: 30}, click: [245, 291]}
    - {ocr: {x: 258, y: 313, w: 207, h: 30}, click: [244, 326]}
    - {ocr: {x: 258, y: 356, w: 207, h: 29}, click: [245, 368]}
    - {ocr: {x: 258, y: 397, w: 207, h: 28}, click: [244, 410]}
    - {ocr: {x: 258, y: 437, w: 205, h: 31}, click: [244, 452]}

# Click here before pressing arts so keys land in the CRAFT WINDOW, not the hotbar/
# chat (FORGE.md §5 focus discipline). The owner's "mouse safe" point.
craft_focus_click: [837, 144]

# --- char-select: OCR-and-click the right character (FORGE.md §5.5) -----------
# Names repeat across servers (e.g. two Robskins) — pick the one on `server`
# (sorts toward the BOTTOM of the list). list_region is the left character list;
# play_click is the maroon Play button in the right detail panel. Measured at
# 1920x1080 from a live char-select; refine if the list scrolls.
char_select:
  list_region: {x: 80, y: 380, w: 420, h: 560}   # the "Select Character" name column (OCR)
  name_region: {x: 1610, y: 748, w: 250, h: 30}  # selected toon's name in the detail panel
                                                   # (above Play) — read to VALIDATE the pick
  row_click_offset_y: 0                            # (unused) legacy
  select_settle_s: 1.0                             # wait between the row click and Play
  play_click: [1715, 890]                          # detail-panel Play (maroon)
  name_click_x: 190                                # x of the centered name column to click
  server: "Wuoshi"                                 # (legacy) duplicate-name server hint
  row_click_x: 100                                 # (legacy) used only by old find_character
  # Exact CLICK-POINT Y per VM per character (offset already included — these are the
  # Y's proven to select each character). Re-mark if you add/delete characters.
  rows:
    iksar_buddy2:          # vm1 (Robskin account, all Wuoshi)
      Robskin: 747
      Paraphon: 791
      Foxyman: 840
      Cruelst: 885
    iksar_buddy3:          # vm2 (Croolst account, all Wuoshi)
      Croolst: 704
      Croalst: 764
      Croalty: 810
      Jenskin: 840

# --- chat-safety (the inviolable invariant, PROJECT.md §6.2) ------------------
# Fail-closed. A keypress is allowed ONLY if BOTH hold:
#   1. game_present  — the self power bar (blue) is rendered => we're in the game
#      world (not login/char-select/loading). Verified crafter HUD coords below.
#   2. chat_input clear — no typed text in the chat-input line.
# Plus focus discipline: the worker clicks craft_focus_click (mouse-safe) before art
# bursts, and never presses ENTER in-world, so keys land in the craft window.
game_present:
  region: {x: 19, y: 44, w: 109, h: 6}      # self power-bar band (blue when in-world)
  blue: [115, 115, 230]
  tolerance: 45
  min_pixels: 20
# chat_input region is DARK when chat is closed (verified across frames), so it never
# false-blocks; typed text raises the bright count. TUNE: confirm the active input
# line actually renders here with a live "chat-open" frame.
chat_input:
  region: {x: 50, y: 1019, w: 208, h: 22}
  bright_threshold: 25

# --- craft-complete chat signal (authoritative completion) -------------------
# OCR the TOP chat lines for 'You gain tradeskill XP!' / 'You created <item>.' — the
# button states (Begin/Create/green-arrow/art-bar) vary too much to detect reliably.
complete_chat:
  region: {x: 15, y: 715, w: 560, h: 70}

# --- progress bar (OCR-FREE completion) --------------------------------------
# Owner: progress = BLUE bar (bottom, y~277), durability = GREEN (top, y~262).
# Craft is done when the blue bar fills to its right end. We sample the last px of
# the bar row; mostly-blue there => progress ~100% => 'You created'.
progress_bar:
  y: 277
  full_x0: 873
  full_x1: 881
  blue: [40, 54, 242]
  tolerance: 70
  full_frac: 0.6

# --- EQ2 chat log (scribed-recipe gathering) ---------------------------------
# "Read recipes from log" parses scribed-recipe lines (Recipe: "X" put in recipe
# book) out of the client chat log. EQ2 writes one log per character at
#   <dir>\<server>\eq2log_<character>.txt        (requires /log ON in-game)
# server comes from char_select.server; character from the bot's selected crafter.
# Windows paths are case-insensitive so the toon's capitalization doesn't matter.
eq2_log:
  dir: 'C:\Users\Public\Daybreak Game Company\Installed Games\EverQuest II\logs'  # CALIBRATE to the client install
  tail: 5000                                  # only scan the last N lines (logs grow huge)

# --- journal OCR region (writs) ----------------------------------------------
# From owner-marked quest-area-blue.png (the writ "I need to make…" panel, right side).
# Writs aren't run until the owner hits crafter L20; TUNE against a real writ then.
journal_ocr:
  region: {x: 1585, y: 255, w: 410, h: 300}   # quest-tracker writ objectives (light-on-dark)
  scale_percent: 250
  tesseract_psm: 6
  negate: true                                  # writ text is light-on-dark -> negate for OCR
  threshold_pct: 60

# --- timings (seconds) -------------------------------------------------------
timings:
  # CRAFT REACTION LOOP (dino model): one grab/iteration, counter checked first + pressed
  # instantly. loop_sleep is the tiny pause between iterations; done_check_interval rate-
  # limits the (non-urgent) finish check so the counter path stays tight.
  loop_sleep: 0.03         # pause between reaction-loop iterations
  done_check_interval: 0.5 # how often to check repeat/Begin/Create (craft finished)
  art_interval: 1.0        # (legacy, unused — loop no longer pauses between filler arts)
  pause: 0.8               # (unused legacy)
  pause_low_mana: 2.5      # longer pause when mana is low (still interruptible)
  # wait=True clicks already CONFIRM the click landed, so SETUP settles are short (speed).
  click_settle: 0.2        # brief UI-react pause after a (confirmed) click
  pre_type_settle: 1.0     # after the search focus-click, before typing
  post_search: 0.4         # after name+ENTER, per match poll
  post_select: 0.2         # after the single-click load
  post_begin: 0.25         # after Begin/Create/Repeat
  post_focus: 0.15         # after the craft-window safe-spot focus click
  running_timeout: 5.0     # after clicking start, wait this long for the red stop-sign
  max_craft_time: 90.0     # bail a single craft if it never completes (avoid a hang)
  mana_wait: 25.0          # low mana between crafts: recover + wait up to this, then press on

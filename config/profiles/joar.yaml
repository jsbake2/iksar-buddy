# Healer-tool profile: JOAR (Dirge — SUPPORT/bard, NOT a healer). No heals/wards/cures.
# maintenance_role/group_maintenance_role = none -> the dashboard renders the DIRGE
# layout: a buff matrix (buffs x group members) + utility on the main page; combat
# (attacks/debuffs/aoe/deaggro) + utility on the focus window. policy.py skips absent
# roles, so Joar queues no auto actions.
#
# Account: account3 (matte123). Owner fills keys via the ⌨ keymap page. Buff roles
# (temp_buff_* / ind_buff_*) carry a `name:` the owner sets in the keymap — that name
# is the row label on the main page where the buff is cast onto a group member.

healer: dirge
abilities:
  # === BUFFS — cast on a group member from the main-page matrix (named in keymap) ===
  # temp buffs (re-applied often)
  temp_buff_1: { key: '', mode: manual, name: '', desc: 'temp buff 1' }
  temp_buff_2: { key: '', mode: manual, name: '', desc: 'temp buff 2' }
  temp_buff_3: { key: '', mode: manual, name: '', desc: 'temp buff 3' }
  temp_buff_4: { key: '', mode: manual, name: '', desc: 'temp buff 4' }
  # individual (permanent) buffs
  ind_buff_1:  { key: '', mode: manual, name: '', desc: 'individual buff 1' }
  ind_buff_2:  { key: '', mode: manual, name: '', desc: 'individual buff 2' }
  ind_buff_3:  { key: '', mode: manual, name: '', desc: 'individual buff 3' }
  ind_buff_4:  { key: '', mode: manual, name: '', desc: 'individual buff 4' }

  # === COMBAT — on the focus window ===
  debuff_1:     { key: '', mode: manual, desc: 'debuff 1' }
  debuff_2:     { key: '', mode: manual, desc: 'debuff 2' }
  attack_1:     { key: '', mode: manual, desc: 'attack 1' }
  attack_2:     { key: '', mode: manual, desc: 'attack 2' }
  enc_attack_1: { key: '', mode: manual, desc: 'encounter attack 1' }
  enc_attack_2: { key: '', mode: manual, desc: 'encounter attack 2' }
  aoe_attack:   { key: '', mode: manual, desc: 'aoe attack' }
  deaggro:      { key: '=', mode: manual, desc: 'de-aggro / drop threat' }

  # === AUTOMATION (host loop; owner sets keys + timings in the Dirge tuning panel) ===
  # Mana feed — reactive on group positions 2/3/4 power (mana_heal_floor). Group when 2+
  # low, else individual on the lowest.
  mana_heal:       { key: '', mode: auto, desc: 'mana feed (single target)' }
  group_mana_heal: { key: '', mode: auto, desc: 'mana feed (group)' }
  # 4 periodic buffs — recast in combat on their own timers (Recast-buffs panel). Each
  # carries a NAME (shown on the panel) + an optional target slot 1-6 (pbuff_N_target;
  # blank/1 = self).
  pbuff_1:  { key: '', mode: auto, name: '', desc: 'periodic buff 1' }
  pbuff_2:  { key: '', mode: auto, name: '', desc: 'periodic buff 2' }
  pbuff_3:  { key: '', mode: auto, name: '', desc: 'periodic buff 3' }
  pbuff_4:  { key: '', mode: auto, name: '', desc: 'periodic buff 4' }

  # === UTILITY / MOVEMENT ===
  follow:      { key: Alt+=,  mode: manual, desc: 'auto-follow toggle' }
  stop_follow: { key: Ctrl+=, mode: manual, desc: 'stop following' }
  jump:        { key: Space,  mode: manual, desc: 'jump (un-stick / pathing)' }
  sow:         { key: '',     mode: manual, desc: 'run-speed (Selo''s)' }
  call_home:   { key: Alt+-,  mode: manual, desc: 'call to home' }
  evac:        { key: '',     mode: manual, desc: 'emergency evac' }
  hail:        { key: '',     mode: manual, desc: 'hail NPC' }
  item_use:    { key: '',     mode: manual, desc: 'use item (totem / temp buff)' }
  camp:        { key: Ctrl+-, mode: manual, desc: 'camp (/camp desktop) — used by Stop Bot' }

group_target_keys:
- F1
- F2
- F3
- F4
- F5
- F6
slot_roles:
- support
- tank
- dps
- dps
- healer
- support
tank_slot: 1
maintenance_role: none
group_maintenance_role: none
names:
  '0': Joar
  '1': ''
  '2': ''
  '3': ''
  '4': ''
  '5': ''
select_character: Joar
